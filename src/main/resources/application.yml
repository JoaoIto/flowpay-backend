spring:
  application:
    name: flowpay-routing
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

meta:
  whatsapp:
    verify-token: ${META_WHATSAPP_VERIFY_TOKEN:default-verify-token}
    app-secret: ${META_WHATSAPP_APP_SECRET:default-app-secret}
