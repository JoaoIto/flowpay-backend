version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flowpay
      POSTGRES_USER: flowpay_dev
      POSTGRES_PASSWORD: flowpay_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay_dev -d flowpay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowpay-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowpay-network

volumes:
  postgres-data:

networks:
  flowpay-network:
    driver: bridge
