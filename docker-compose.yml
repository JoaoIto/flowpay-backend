version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowpay-postgres
    environment:
      POSTGRES_DB: flowpay
      POSTGRES_USER: flowpay_user
      POSTGRES_PASSWORD: flowpay_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay_user -d flowpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
